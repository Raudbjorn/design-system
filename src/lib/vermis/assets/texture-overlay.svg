<?xml version="1.0" encoding="UTF-8"?>
<!--
  layform — Texture Overlay: Halftone-Dot Field (7.4)
  Implements detail-tier Pattern 105 (Halftone-Dot Field — Tiled Vector
  Pattern, Not Procedural Turbulence). See adjoining 7.4-texture-overlay.md
  for full grounding citations and confidence rationale.

  Three pre-baked <pattern> tile variants, each a fixed-size repeating grid
  of solid-filled <circle> elements (no feTurbulence, no raster embeds):
    #halftone-1 — fine/dense   (6x6  tile,  1 dot,  r=1.05)
    #halftone-2 — medium/screen(12x12 tile, 2 dots staggered, r=1.6)
    #halftone-3 — coarse/loose (18x18 tile, 1 dot,  r=3.4)

  Consume elsewhere via fill="url(#halftone-1|2|3)" on any shape. Each tile
  is transparent outside its dots so it composites as a true overlay on top
  of any custom-property surface color (e.g. layform-parchment-1); see the .md spec for recommended
  overlay opacity per surface (dots are drawn fully opaque here only to
  make the tile geometry legible in this preview swatch).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 170" width="320" height="170"
     role="img" aria-labelledby="halftone-title halftone-desc">
  <title id="halftone-title">Halftone-Dot Field texture overlay — 3 tile variants</title>
  <desc id="halftone-desc">Three tileable SVG pattern definitions (halftone-1 fine, halftone-2 medium/staggered, halftone-3 coarse) demonstrated as swatches over a parchment background, per detail-tier Pattern 105.</desc>

  <defs>
    <!-- halftone-1: fine/dense grid — smallest, tightest dot field -->
    <pattern id="halftone-1" patternUnits="userSpaceOnUse" width="6" height="6">
      <circle cx="3" cy="3" r="1.05" fill="var(--layform-ink-2, #1c1c1c)" />
    </pattern>

    <!-- halftone-2: medium, staggered two-dot tile — mimics a true offset
         print halftone screen (rows offset by half the tile pitch) rather
         than a plain single-dot grid. -->
    <pattern id="halftone-2" patternUnits="userSpaceOnUse" width="12" height="12">
      <circle cx="3" cy="3" r="1.6" fill="var(--layform-ink-2, #1c1c1c)" />
      <circle cx="9" cy="9" r="1.6" fill="var(--layform-ink-2, #1c1c1c)" />
    </pattern>

    <!-- halftone-3: coarse/loose grid — largest dot, widest spacing, for
         risograph/screen-print-like coarse-screen surfaces. -->
    <pattern id="halftone-3" patternUnits="userSpaceOnUse" width="18" height="18">
      <circle cx="9" cy="9" r="3.4" fill="var(--layform-ink-2, #1c1c1c)" />
    </pattern>
  </defs>

  <!-- canvas background -->
  <rect x="0" y="0" width="320" height="170" fill="var(--layform-parchment-1, #f0e6d2)" />

  <text x="10" y="14" font-family="var(--layform-font-marginalia, ui-monospace, 'Iosevka', monospace)"
        font-size="9" fill="var(--layform-ink-2, #1c1c1c)">Pattern 105 — Halftone-Dot Field: 3 tile variants</text>

  <!-- Swatch 1: halftone-1 (fine/dense) -->
  <g>
    <rect x="10" y="24" width="90" height="90" fill="var(--layform-parchment-2, #d8cfb8)" />
    <rect x="10" y="24" width="90" height="90" fill="url(#halftone-1)" />
    <rect x="10" y="24" width="90" height="90" fill="none" stroke="var(--layform-ink-2, #1c1c1c)" stroke-width="1" />
    <text x="55" y="128" text-anchor="middle" font-family="var(--layform-font-marginalia, ui-monospace, 'Iosevka', monospace)"
          font-size="8" fill="var(--layform-ink-2, #1c1c1c)">halftone-1</text>
    <text x="55" y="140" text-anchor="middle" font-family="var(--layform-font-marginalia, ui-monospace, 'Iosevka', monospace)"
          font-size="7" fill="var(--layform-ink-2, #1c1c1c)">fine · 6px tile</text>
  </g>

  <!-- Swatch 2: halftone-2 (medium/staggered) -->
  <g>
    <rect x="115" y="24" width="90" height="90" fill="var(--layform-parchment-2, #d8cfb8)" />
    <rect x="115" y="24" width="90" height="90" fill="url(#halftone-2)" />
    <rect x="115" y="24" width="90" height="90" fill="none" stroke="var(--layform-ink-2, #1c1c1c)" stroke-width="1" />
    <text x="160" y="128" text-anchor="middle" font-family="var(--layform-font-marginalia, ui-monospace, 'Iosevka', monospace)"
          font-size="8" fill="var(--layform-ink-2, #1c1c1c)">halftone-2</text>
    <text x="160" y="140" text-anchor="middle" font-family="var(--layform-font-marginalia, ui-monospace, 'Iosevka', monospace)"
          font-size="7" fill="var(--layform-ink-2, #1c1c1c)">medium · 12px tile, staggered</text>
  </g>

  <!-- Swatch 3: halftone-3 (coarse/loose) -->
  <g>
    <rect x="220" y="24" width="90" height="90" fill="var(--layform-parchment-2, #d8cfb8)" />
    <rect x="220" y="24" width="90" height="90" fill="url(#halftone-3)" />
    <rect x="220" y="24" width="90" height="90" fill="none" stroke="var(--layform-ink-2, #1c1c1c)" stroke-width="1" />
    <text x="265" y="128" text-anchor="middle" font-family="var(--layform-font-marginalia, ui-monospace, 'Iosevka', monospace)"
          font-size="8" fill="var(--layform-ink-2, #1c1c1c)">halftone-3</text>
    <text x="265" y="140" text-anchor="middle" font-family="var(--layform-font-marginalia, ui-monospace, 'Iosevka', monospace)"
          font-size="7" fill="var(--layform-ink-2, #1c1c1c)">coarse · 18px tile</text>
  </g>

  <text x="10" y="158" font-family="var(--layform-font-marginalia, ui-monospace, 'Iosevka', monospace)"
        font-size="7" fill="var(--layform-ink-2, #1c1c1c)">Reference via fill="url(#halftone-1|2|3)" — see 7.4-texture-overlay.md for overlay-opacity guidance.</text>
</svg>
