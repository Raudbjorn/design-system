<?xml version="1.0" encoding="UTF-8"?>
<!--
  layform — Page Filters (7.8)
  Implements detail-tier Pattern 107 (Aged-Paper Grain Overlay — Single
  Full-Bleed Filter, Not a Per-Component Effect), Pattern 108 (Woven-Fabric
  Weave — Rare Closing-Page Accent, Not a General Texture), and Pattern 109
  (Eroded-Edge Border — Deterministic Displacement, Not True Randomization).
  See the adjoining 7.8-page-filters.md for full grounding citations,
  confidence rationale, and usage RESTRICTIONS — Pattern 107's "apply once
  per page view, never per-component" rule and Pattern 108's "closing-page
  only, never a general fill option" reservation are usage rules, not just
  descriptive comments; read the .md before wiring either into a component.

    #grain         — Pattern 107, one static <filter>, full-bleed
                     background-layer use ONLY, never re-instantiated per
                     card/chip/callout.
    #weave         — Pattern 108, tileable <pattern>, RESERVED exclusively
                     for document-tier Pattern 48's closing page.
    #erode-medium  — Pattern 109, one static <filter> with a fixed,
                     hardcoded seed so output is deterministic and
                     screenshot-testable, never a randomized-per-render seed.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200"
     role="img" aria-labelledby="page-filters-title page-filters-desc">
  <title id="page-filters-title">layform page filters — grain, weave, eroded edge</title>
  <desc id="page-filters-desc">
    Three detail-tier page-level filter/pattern techniques: an aged-paper grain filter
    (Pattern 107, full-bleed background use only), a woven-fabric fill pattern (Pattern 108,
    reserved exclusively for the closing page), and a fixed-seed eroded-edge displacement filter
    (Pattern 109). See the adjoining 7.8-page-filters.md for grounding and usage restrictions.
  </desc>

  <defs>
    <!-- ================= Pattern 107: aged-paper grain (full-bleed background ONLY) =================
         feTurbulence fractalNoise piped through feColorMatrix to monochrome,
         then softened to a low-opacity overlay via feComponentTransfer and
         merged back over the source graphic — one static filter, applied to
         a single full-bleed background layer per document view, never
         re-instantiated per card/chip/callout (Pattern 107's own solution
         constraint; see the .md "usage rule" section). -->
    <filter id="grain" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="grainNoise"/>
      <feColorMatrix in="grainNoise" type="saturate" values="0" result="grainMono"/>
      <feComponentTransfer in="grainMono" result="grainSoft">
        <feFuncA type="linear" slope="0.18" intercept="0"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode in="grainSoft"/>
      </feMerge>
    </filter>

    <!-- ================= Pattern 108: woven-fabric weave (closing page ONLY, see .md) =================
         One SVG <pattern> tile, two perpendicular sets of offset rectangles
         simulating warp/weft threads at a fixed small scale. Reserved
         exclusively as a closing/back-matter accent treatment for
         document-tier Pattern 48 (The Closing Page as a Quiet Counterpoint
         to the Cover) — never exposed as a general-purpose fill option
         alongside Patterns 105-107. Colors reuse the tan/masonry family
         (digital-scope invention — no fabric-specific color token exists in
         7.1-colors.css; see the .md honesty note). -->
    <pattern id="weave" patternUnits="userSpaceOnUse" width="16" height="16">
      <rect x="0" y="0" width="16" height="16" fill="var(--layform-parchment-2, #d8cfb8)"/>
      <rect x="0" y="0" width="7" height="16" fill="var(--layform-accent-tan-2, #8b6f47)"/>
      <rect x="8" y="0" width="7" height="16" fill="var(--layform-accent-tan-2, #8b6f47)" opacity="0.55"/>
      <rect x="0" y="0" width="16" height="7" fill="var(--layform-accent-tan-3, #c9a876)" opacity="0.7"/>
      <rect x="0" y="8" width="16" height="7" fill="var(--layform-accent-tan-3, #c9a876)" opacity="0.35"/>
    </pattern>

    <!-- ================= Pattern 109: eroded-edge border (fixed seed, deterministic) =================
         feTurbulence with a FIXED, hardcoded seed (7 — any integer works,
         what matters is that it never changes) combined with
         feDisplacementMap applied to the border shape. The seed is
         hardcoded specifically so the same component instance renders an
         identical eroded outline every time — deterministic and cacheable,
         per Pattern 109's own solution requirement — never a randomized
         seed per render. -->
    <filter id="erode-medium" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="2" seed="7" result="erosionNoise"/>
      <feDisplacementMap in="SourceGraphic" in2="erosionNoise" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- canvas background -->
  <rect x="0" y="0" width="400" height="200" fill="var(--layform-parchment-1, #f0e6d2)"/>

  <text x="10" y="14" font-family="var(--layform-font-marginalia, ui-monospace, 'Iosevka', monospace)"
        font-size="9" fill="var(--layform-ink-2, #1c1c1c)">Patterns 107 / 108 / 109 — page filters</text>

  <!-- Swatch 1: grain -->
  <g>
    <rect x="10" y="24" width="110" height="90" fill="var(--layform-parchment-1, #f0e6d2)" filter="url(#grain)"/>
    <rect x="10" y="24" width="110" height="90" fill="none" stroke="var(--layform-ink-2, #1c1c1c)" stroke-width="1"/>
    <text x="65" y="128" text-anchor="middle" font-family="var(--layform-font-marginalia, ui-monospace, 'Iosevka', monospace)"
          font-size="8" fill="var(--layform-ink-2, #1c1c1c)">#grain — Pattern 107</text>
    <text x="65" y="140" text-anchor="middle" font-family="var(--layform-font-marginalia, ui-monospace, 'Iosevka', monospace)"
          font-size="7" fill="var(--layform-ink-2, #1c1c1c)">full-bleed only, never per-component</text>
  </g>

  <!-- Swatch 2: weave -->
  <g>
    <rect x="135" y="24" width="110" height="90" fill="url(#weave)"/>
    <rect x="135" y="24" width="110" height="90" fill="none" stroke="var(--layform-ink-2, #1c1c1c)" stroke-width="1"/>
    <text x="190" y="128" text-anchor="middle" font-family="var(--layform-font-marginalia, ui-monospace, 'Iosevka', monospace)"
          font-size="8" fill="var(--layform-ink-2, #1c1c1c)">#weave — Pattern 108</text>
    <text x="190" y="140" text-anchor="middle" font-family="var(--layform-font-marginalia, ui-monospace, 'Iosevka', monospace)"
          font-size="7" fill="var(--layform-ink-2, #1c1c1c)">reserved: closing page only (Pattern 48)</text>
  </g>

  <!-- Swatch 3: erode-medium applied to a bordered rect -->
  <g>
    <rect x="264" y="43" width="90" height="52" fill="none" stroke="var(--layform-ink-2, #1c1c1c)"
          stroke-width="var(--layform-border-medium, 3px)" filter="url(#erode-medium)"/>
    <rect x="260" y="24" width="130" height="90" fill="none" stroke="var(--layform-ink-2, #1c1c1c)" stroke-width="1"/>
    <text x="325" y="128" text-anchor="middle" font-family="var(--layform-font-marginalia, ui-monospace, 'Iosevka', monospace)"
          font-size="8" fill="var(--layform-ink-2, #1c1c1c)">#erode-medium — Pattern 109</text>
    <text x="325" y="140" text-anchor="middle" font-family="var(--layform-font-marginalia, ui-monospace, 'Iosevka', monospace)"
          font-size="7" fill="var(--layform-ink-2, #1c1c1c)">fixed seed=7 — deterministic, cacheable</text>
  </g>

  <text x="10" y="190" font-family="var(--layform-font-marginalia, ui-monospace, 'Iosevka', monospace)"
        font-size="7" fill="var(--layform-ink-2, #1c1c1c)">See 7.8-page-filters.md for grounding, usage restrictions, and confidence.</text>
</svg>
